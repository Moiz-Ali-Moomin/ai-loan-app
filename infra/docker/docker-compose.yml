# =============================================================
# AI Loan Governance Platform — Production Stack
# Secrets are loaded from infra/docker/.env (never commit it).
# Copy .env.example → .env and fill in real values.
#
# Memory budget (3.8 GB VPS):
#   Infrastructure       ~1 150 MB
#   Observability        ~  736 MB
#   Application services ~  960 MB
#   OS + Docker overhead ~  600 MB
#   ─────────────────────────────
#   Total                ~3 446 MB  (leaves ~380 MB headroom)
# =============================================================

networks:
  loan-platform:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  minio_data:
  temporal_data:
  grafana_data:
  loki_data:
  tempo_data:
  prometheus_data:
  fastembed_cache:

services:

  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: loan-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
      - ../../infra/postgres/migrations:/migrations:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - loan-platform

  redis:
    image: redis:7-alpine
    container_name: loan-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    # maxmemory kept below the container limit so Redis evicts keys
    # before the OOM killer terminates the process.
    command: redis-server --appendonly yes --maxmemory 96mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loan-platform

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: loan-zookeeper
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Keep the JVM heap well inside the container limit.
      KAFKA_HEAP_OPTS: "-Xmx96m -Xms64m"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    expose:
      - "2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loan-platform

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: loan-kafka
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${VPS_IP}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_LOGGERS: "kafka.controller=WARN,kafka.producer.async.DefaultEventHandler=WARN,state.change.logger=WARN"
      # Heap kept well under the 512 MB container limit.
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms256m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - loan-platform

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: loan-kafka-ui
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      SERVER_PORT: 8080
      # Spring Boot JVM heap inside the container limit.
      JAVA_OPTS: "-Xmx128m -Xms64m"
    ports:
      - "8090:8080"
    networks:
      - loan-platform

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: loan-minio
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loan-platform

  minio-init:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    container_name: loan-minio-init
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/ai-prompts;
        mc mb --ignore-existing local/ai-responses;
        mc mb --ignore-existing local/workflow-snapshots;
        mc mb --ignore-existing local/compliance-artifacts;
        mc mb --ignore-existing local/archived-traces;
        mc policy set private local/ai-prompts;
        mc policy set private local/ai-responses;
        mc policy set private local/compliance-artifacts;
        echo 'MinIO buckets initialized';
      "
    networks:
      - loan-platform

  # ============================================================
  # TEMPORAL
  # ============================================================

  temporal-postgres:
    image: postgres:16-alpine
    container_name: loan-temporal-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_DB: temporal
    volumes:
      - temporal_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEMPORAL_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loan-platform

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: loan-temporal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PWD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_SEEDS: temporal-postgres
      ENABLE_ES: "false"
      TEMPORAL_CORS_ORIGINS: "${PUBLIC_ORIGIN}:3006"
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s
    networks:
      - loan-platform

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: loan-temporal-ui
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "${PUBLIC_ORIGIN}:3006"
    ports:
      - "8088:8080"
    networks:
      - loan-platform

  # ============================================================
  # OPEN POLICY AGENT
  # ============================================================

  opa:
    image: openpolicyagent/opa:0.65.0
    container_name: loan-opa
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--log-format=json"
      - "--set=decision_logs.console=true"
      - "/policies"
    volumes:
      - ../../infra/opa/policies:/policies:ro
    expose:
      - "8181"
    healthcheck:
      test: ["CMD", "/opa", "eval", "--v1-compatible", "1 == 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - loan-platform

  # ============================================================
  # OBSERVABILITY — LGTM STACK
  # ============================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: loan-otel-collector
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel-collector.yaml:ro
    expose:
      - "4317"
      - "4318"
      - "8889"
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - loan-platform

  loki:
    image: grafana/loki:3.0.0
    container_name: loan-loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - loan-platform

  tempo:
    image: grafana/tempo:2.4.2
    container_name: loan-tempo
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    expose:
      - "3200"
      - "4317"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - loan-platform

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: loan-prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - loan-platform

  grafana:
    image: grafana/grafana:10.4.3
    container_name: loan-grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceQLStreaming metricsSummary
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ../../infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3100:3000"
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - loan-platform

  # ============================================================
  # LOCAL EMBEDDING SERVICE (BGE-small-en-v1.5 via FastEmbed)
  # ============================================================

  fastembed:
    image: python:3.11-slim
    container_name: loan-fastembed
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    environment:
      FASTEMBED_MODEL: ${FASTEMBED_MODEL:-BAAI/bge-small-en-v1.5}
      FASTEMBED_PORT: "8000"
    volumes:
      - fastembed_cache:/root/.cache/fastembed
    expose:
      - "8000"
    command: >
      /bin/sh -c "
        pip install --quiet fastembed uvicorn fastapi 2>/dev/null &&
        python -c \"
import os, uvicorn
from fastapi import FastAPI
from pydantic import BaseModel
from typing import List
from fastembed import TextEmbedding

model_name = os.environ.get('FASTEMBED_MODEL', 'BAAI/bge-small-en-v1.5')
model = TextEmbedding(model_name=model_name)

app = FastAPI()

class EmbedRequest(BaseModel):
    texts: List[str]

@app.post('/embed')
def embed(req: EmbedRequest):
    embeddings = list(model.embed(req.texts))
    return {'embeddings': [e.tolist() for e in embeddings], 'model': model_name, 'dimensions': len(embeddings[0]) if embeddings else 0}

@app.get('/health')
def health():
    return {'status': 'healthy', 'model': model_name}

uvicorn.run(app, host='0.0.0.0', port=int(os.environ.get('FASTEMBED_PORT', 8000)))
\"
      "
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null && echo ok"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - loan-platform

  # ============================================================
  # APPLICATION SERVICES
  # ============================================================

  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    container_name: loan-api-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    environment:
      NODE_ENV: production
      PORT: 3000
      NODE_OPTIONS: "--max-old-space-size=128"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: loan-governance
      OPA_URL: http://opa:8181
      JWT_SECRET: ${JWT_SECRET}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY}
      PII_KEY_VERSION: ${PII_KEY_VERSION:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      WORKFLOW_SERVICE_URL: http://workflow-service:3001
      POLICY_SERVICE_URL: http://policy-service:3002
      AI_SERVICE_URL: http://ai-execution-service:3003
      AUDIT_SERVICE_URL: http://audit-service:3004
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - loan-platform

  workflow-service:
    build:
      context: ../..
      dockerfile: services/workflow-service/Dockerfile
    container_name: loan-workflow-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PORT: 3001
      NODE_OPTIONS: "--max-old-space-size=128"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BROKERS: kafka:29092
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: loan-governance
      TEMPORAL_TASK_QUEUE: loan-approval
      REDIS_URL: redis://redis:6379
      OPA_URL: http://opa:8181
      POLICY_SERVICE_URL: http://policy-service:3002
      AI_SERVICE_URL: http://ai-execution-service:3003
      AUDIT_SERVICE_URL: http://audit-service:3004
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - loan-platform

  policy-service:
    build:
      context: ../..
      dockerfile: services/policy-service/Dockerfile
    container_name: loan-policy-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      NODE_ENV: production
      PORT: 3002
      NODE_OPTIONS: "--max-old-space-size=96"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OPA_URL: http://opa:8181
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - loan-platform

  ai-execution-service:
    build:
      context: ../..
      dockerfile: services/ai-execution-service/Dockerfile
    container_name: loan-ai-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      NODE_ENV: production
      PORT: 3003
      NODE_OPTIONS: "--max-old-space-size=96"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_MOCK_MODE: ${AI_MOCK_MODE}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-6}
      ACTIVE_PROMPT_VERSION: ${ACTIVE_PROMPT_VERSION:-1.2.0}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      FASTEMBED_URL: http://fastembed:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RAG_SIMILARITY_THRESHOLD: ${RAG_SIMILARITY_THRESHOLD:-0.72}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      RAG_MAX_CONTEXT_TOKENS: ${RAG_MAX_CONTEXT_TOKENS:-6000}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_PROMPTS: ai-prompts
      MINIO_BUCKET_RESPONSES: ai-responses
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      fastembed:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3003/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - loan-platform

  audit-service:
    build:
      context: ../..
      dockerfile: services/audit-service/Dockerfile
    container_name: loan-audit-service
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      NODE_ENV: production
      PORT: 3004
      NODE_OPTIONS: "--max-old-space-size=96"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY}
      KAFKA_BROKERS: kafka:29092
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3004/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - loan-platform

  event-consumer:
    build:
      context: ../..
      dockerfile: services/event-consumer/Dockerfile
    container_name: loan-event-consumer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      NODE_ENV: production
      PORT: 3005
      NODE_OPTIONS: "--max-old-space-size=96"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
      AUDIT_SERVICE_URL: http://audit-service:3004
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3005:3005"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3005/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - loan-platform

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: loan-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
    env_file:
      - ../../frontend/.env.production
    environment:
      HOSTNAME: "0.0.0.0"
    ports:
      - "3006:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - loan-platform
