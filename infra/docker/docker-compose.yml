# =============================================================
# AI Loan Governance Platform — Production Stack
# Secrets are loaded from infra/docker/.env (never commit it).
# Copy .env.example → .env and fill in real values.
# =============================================================

networks:
  loan-platform:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  minio_data:
  temporal_data:
  grafana_data:
  loki_data:
  tempo_data:
  prometheus_data:

services:

  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: loan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
      - ../../infra/postgres/migrations:/migrations:ro
    # No host port — postgres must not be reachable from the internet.
    # Services on the loan-platform network reach it at postgres:5432.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - loan-platform

  redis:
    image: redis:7-alpine
    container_name: loan-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # No host port — redis must not be reachable from the internet.
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loan-platform

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: loan-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    # Internal only — Kafka is the only consumer of Zookeeper.
    expose:
      - "2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loan-platform

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: loan-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT        — internal Docker-network listener (containers → kafka:29092)
      # PLAINTEXT_HOST   — host/external listener.
      #                    Advertises the VPS public IP so that clients running
      #                    outside the container network (e.g. local dev tools
      #                    connecting to the VPS) resolve to the right address.
      #                    All-internal stacks can change VPS_IP to localhost.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${VPS_IP}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_LOGGERS: "kafka.controller=WARN,kafka.producer.async.DefaultEventHandler=WARN,state.change.logger=WARN"
    volumes:
      - kafka_data:/var/lib/kafka/data
    # 9092 is exposed for external clients (e.g. local dev tools hitting the VPS).
    # If Kafka should be fully internal, remove the ports block and use expose only.
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - loan-platform

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: loan-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      SERVER_PORT: 8080
    ports:
      - "8090:8080"
    networks:
      - loan-platform

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: loan-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # 9000 — S3 API (used by services internally; also needed if you want to
    #         access buckets from outside the VPS).
    # 9001 — MinIO web console.
    # Both are exposed here because the frontend links to the console.
    # If you add a reverse proxy, remove these ports and proxy through Nginx.
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loan-platform

  minio-init:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    container_name: loan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/ai-prompts;
        mc mb --ignore-existing local/ai-responses;
        mc mb --ignore-existing local/workflow-snapshots;
        mc mb --ignore-existing local/compliance-artifacts;
        mc mb --ignore-existing local/archived-traces;
        mc policy set private local/ai-prompts;
        mc policy set private local/ai-responses;
        mc policy set private local/compliance-artifacts;
        echo 'MinIO buckets initialized';
      "
    networks:
      - loan-platform

  # ============================================================
  # TEMPORAL
  # ============================================================

  temporal-postgres:
    image: postgres:16-alpine
    container_name: loan-temporal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_DB: temporal
    volumes:
      - temporal_data:/var/lib/postgresql/data
    # Internal only — only temporal reads this database.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEMPORAL_POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loan-platform

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: loan-temporal
    restart: unless-stopped
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PWD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_SEEDS: temporal-postgres
      ENABLE_ES: "false"
      TEMPORAL_BROADCAST_ADDRESS: "0.0.0.0"
      TEMPORAL_CORS_ORIGINS: "${PUBLIC_ORIGIN}:3006"
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address 127.0.0.1:7233 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s
    networks:
      - loan-platform

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: loan-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "${PUBLIC_ORIGIN}:3006"
    ports:
      - "8088:8080"
    networks:
      - loan-platform

  # ============================================================
  # OPEN POLICY AGENT
  # ============================================================

  opa:
    # Use the non-debug image in production to reduce attack surface.
    # Switch to latest-debug only when actively troubleshooting policies.
    image: openpolicyagent/opa:0.65.0
    container_name: loan-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--log-format=json"
      - "--set=decision_logs.console=true"
      - "/policies"
    volumes:
      - ../../infra/opa/policies:/policies:ro
    # OPA must not be reachable from the internet — policy evaluation is
    # an internal concern.  Services call it at http://opa:8181.
    expose:
      - "8181"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8181/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - loan-platform

  # ============================================================
  # OBSERVABILITY — LGTM STACK
  # ============================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: loan-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel-collector.yaml:ro
    # OTLP ports are internal only — only our own services push telemetry.
    # Prometheus scrapes port 8889 internally too.
    expose:
      - "4317"
      - "4318"
      - "8889"
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - loan-platform

  loki:
    image: grafana/loki:3.0.0
    container_name: loan-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    # Internal only — Grafana queries Loki on its internal hostname.
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - loan-platform

  tempo:
    image: grafana/tempo:2.4.2
    container_name: loan-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    # Internal only — Grafana and the otel-collector reach Tempo by container name.
    expose:
      - "3200"
      - "4317"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - loan-platform

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: loan-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    # Internal only — Grafana queries Prometheus on its internal hostname.
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - loan-platform

  grafana:
    image: grafana/grafana:10.4.3
    container_name: loan-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceQLStreaming metricsSummary
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ../../infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3100:3000"
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - loan-platform

  # ============================================================
  # APPLICATION SERVICES
  # ============================================================

  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    container_name: loan-api-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: loan-governance
      OPA_URL: http://opa:8181
      JWT_SECRET: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      WORKFLOW_SERVICE_URL: http://workflow-service:3001
      POLICY_SERVICE_URL: http://policy-service:3002
      AI_SERVICE_URL: http://ai-execution-service:3003
      AUDIT_SERVICE_URL: http://audit-service:3004
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - loan-platform

  workflow-service:
    build:
      context: ../..
      dockerfile: services/workflow-service/Dockerfile
    container_name: loan-workflow-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BROKERS: kafka:29092
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: loan-governance
      TEMPORAL_TASK_QUEUE: loan-approval
      REDIS_URL: redis://redis:6379
      OPA_URL: http://opa:8181
      POLICY_SERVICE_URL: http://policy-service:3002
      AI_SERVICE_URL: http://ai-execution-service:3003
      AUDIT_SERVICE_URL: http://audit-service:3004
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - loan-platform

  policy-service:
    build:
      context: ../..
      dockerfile: services/policy-service/Dockerfile
    container_name: loan-policy-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OPA_URL: http://opa:8181
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - loan-platform

  ai-execution-service:
    build:
      context: ../..
      dockerfile: services/ai-execution-service/Dockerfile
    container_name: loan-ai-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_MOCK_MODE: ${AI_MOCK_MODE}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3003/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - loan-platform

  audit-service:
    build:
      context: ../..
      dockerfile: services/audit-service/Dockerfile
    container_name: loan-audit-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BROKERS: kafka:29092
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3004/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - loan-platform

  event-consumer:
    build:
      context: ../..
      dockerfile: services/event-consumer/Dockerfile
    container_name: loan-event-consumer
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
      AUDIT_SERVICE_URL: http://audit-service:3004
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3005:3005"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3005/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - loan-platform

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: loan-frontend
    restart: unless-stopped
    env_file:
      - ../../frontend/.env.production
    ports:
      - "3006:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - loan-platform
