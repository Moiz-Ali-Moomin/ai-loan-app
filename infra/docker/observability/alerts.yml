groups:
  - name: loan-platform-alerts
    rules:
      - alert: HighRiskLoanVolumeSpike
        expr: rate(loan_requests_total{risk_level="HIGH"}[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High volume of high-risk loan applications"
          description: "More than 10 high-risk loan applications per minute for 2 minutes"

      - alert: AIDecisionLatencyHigh
        expr: histogram_quantile(0.95, rate(ai_decision_latency_ms_bucket[5m])) > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI decision latency is high"
          description: "95th percentile AI decision latency > 5s"

      - alert: PolicyViolationRateHigh
        expr: rate(policy_violations_total[5m]) / rate(policy_evaluations_total[5m]) > 0.5
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "High policy violation rate"
          description: "More than 50% of policy evaluations are resulting in violations"

      - alert: WorkflowFailureRateHigh
        expr: rate(workflow_completed_total{status="FAILED"}[5m]) / rate(workflow_completed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High workflow failure rate"
          description: "More than 10% of workflows are failing"

      - alert: HumanApprovalQueueDepth
        expr: human_approvals_requested_total - human_approvals_completed_total > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Human approval queue backlog"
          description: "More than 50 pending human approvals"

      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group lag exceeds 1000 messages"

      - alert: DatabaseConnectionPoolSaturation
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool near saturation"
          description: "PostgreSQL connection pool is over 80% utilized"
