global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: loan-platform
    environment: development

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: api-gateway
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: /metrics

  - job_name: workflow-service
    static_configs:
      - targets: ['workflow-service:3001']
    metrics_path: /metrics

  - job_name: policy-service
    static_configs:
      - targets: ['policy-service:3002']
    metrics_path: /metrics

  - job_name: ai-execution-service
    static_configs:
      - targets: ['ai-execution-service:3003']
    metrics_path: /metrics

  - job_name: audit-service
    static_configs:
      - targets: ['audit-service:3004']
    metrics_path: /metrics

  - job_name: event-consumer
    static_configs:
      - targets: ['event-consumer:3005']
    metrics_path: /metrics

  - job_name: decision-service
    static_configs:
      - targets: ['decision-service:3007']
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ['postgres:9187']

  - job_name: kafka
    static_configs:
      - targets: ['kafka:9308']

  - job_name: redis
    static_configs:
      - targets: ['redis:9121']

  - job_name: opa
    static_configs:
      - targets: ['opa:8181']
    metrics_path: /metrics
