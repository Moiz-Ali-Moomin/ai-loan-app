apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-service
  namespace: loan-platform
  labels:
    app: workflow-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workflow-service
  template:
    metadata:
      labels:
        app: workflow-service
    spec:
      serviceAccountName: loan-platform-sa
      containers:
        - name: workflow-service
          image: loan-platform/workflow-service:latest
          env:
            - name: OTEL_SERVICE_NAME
              value: "workflow-service"
            - name: POLICY_SERVICE_URL
              value: "http://policy-service-service:3002"
            - name: AI_SERVICE_URL
              value: "http://ai-execution-service-service:3003"
            - name: AUDIT_SERVICE_URL
              value: "http://audit-service-service:3004"
          envFrom:
            - configMapRef:
                name: loan-platform-config
            - secretRef:
                name: loan-platform-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
