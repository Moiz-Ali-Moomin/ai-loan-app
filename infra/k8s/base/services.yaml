---
# Policy Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-service
  namespace: loan-platform
  labels:
    app: policy-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: policy-service
  template:
    metadata:
      labels:
        app: policy-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: loan-platform-sa
      containers:
        - name: policy-service
          image: loan-platform/policy-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: OTEL_SERVICE_NAME
              value: "policy-service"
          envFrom:
            - configMapRef:
                name: loan-platform-config
            - secretRef:
                name: loan-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 15
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: policy-service-service
  namespace: loan-platform
spec:
  selector:
    app: policy-service
  ports:
    - port: 3002
      targetPort: 3002
      name: http
