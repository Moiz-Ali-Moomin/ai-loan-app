---
# Event Consumer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-consumer
  namespace: loan-platform
  labels:
    app: event-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-consumer
  template:
    metadata:
      labels:
        app: event-consumer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3005"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: loan-platform-sa
      containers:
        - name: event-consumer
          image: loan-platform/event-consumer:latest
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: OTEL_SERVICE_NAME
              value: "event-consumer"
            - name: KAFKA_GROUP_ID_EVENTS
              value: "event-consumer-group"
          envFrom:
            - configMapRef:
                name: loan-platform-config
            - secretRef:
                name: loan-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
---
# Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: loan-platform
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: loan-platform/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.loangov.example.com"
            - name: NEXT_PUBLIC_TEMPORAL_UI_URL
              value: "https://temporal.loangov.example.com"
            - name: NEXT_PUBLIC_GRAFANA_URL
              value: "https://grafana.loangov.example.com"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: loan-platform
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
      name: http
